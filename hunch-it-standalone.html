<body>
  <div id="app"></div>
  <script>
    const DATA={ticker:'MU',company:'Micron',source:'小紅書',creator:'@半導體阿明',date:'7 月 8 日',link:'https://www.xiaohongshu.com/explore/mu-hbm-demo',thesis:'AI data center 的高頻寬記憶體需求，可能讓 Micron 的獲利結構改變。',risk:'AI 記憶體需求是真的，但 Micron 的供應與毛利沒有同步改善。',warning:'下一季法說仍強調 AI 潛力，但 data center 營收或 guidance 沒有變好。',narrative:'類似的「AI 記憶體受惠」說法約從 2025 年第二季開始密集出現。這則內容的位置比較像已大幅上漲後。',claims:[['Hyperscaler 正在增加 HBM 採購','事實'],['Micron 的 HBM3E 將快速取得份額','解讀'],['2026 年相關營收會翻倍','預測'],['現在不看就會錯過整輪行情','情緒']],drafts:['AI 記憶體需求可能讓 Micron 比市場原本預期更有價值。','這個變化是不是已經反映在價格與市場注意力裡。','我看到的是新的公司證據，還是大家已經在講的敘事。']};
    const modules=[['A','拆解這個想法','他要你信什麼'],['C','這怎麼會錯','第一個警訊'],['D','現在會太晚嗎','內容出現的位置'],['F','我的判斷','改成自己的話']];
    const state={screen:'inbox',source:'link',input:'',creator:'',pre:'',processing:false,active:'A',completed:[],claimTags:DATA.claims.map(x=>x[1]),convinced:null,riskResponse:'',warningSaved:false,post:'',ai:{thesis:DATA.thesis,risk:DATA.risk,warning:DATA.warning,narrative:DATA.narrative},modifiedAi:[],editingAi:null,drafts:[...DATA.drafts],modifiedDrafts:[],editingDraft:null,stance:'',wait:'',toast:''};
    const $=s=>document.querySelector(s);const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function header(){return `<header class="app-header"><div class="header-inner"><button class="wordmark" data-action="go" data-screen="inbox"><span class="logo">h</span>hunch it</button><nav class="nav"><button class="${state.screen!=='library'?'active':''}" data-action="go" data-screen="inbox">想法</button><button class="${state.screen==='library'?'active':''}" data-action="go" data-screen="library">我的庫</button></nav><div class="header-actions"><span class="prototype-badge">全假資料 · 單檔 HTML</span><button class="button primary" data-action="go" data-screen="new">＋ 新想法</button></div></div></header>`}
    function render(){let body=state.screen==='inbox'?inbox():state.screen==='new'?newIdea():state.screen==='judgment'?judgment():state.screen==='summary'?summary():library();$('#app').innerHTML=header()+`<main>${body}</main>`+(state.toast?`<div class="toast" role="status">✓ ${esc(state.toast)}</div>`:'');bindInputs()}
    function go(screen){state.screen=screen;state.processing=false;window.scrollTo(0,0);render()}
    function inbox(){return `<div class="page"><section class="hero"><div><p class="context">你的想法收件匣</p><h1>先別急著相信。<br>拆成你的判斷。</h1><p class="lede">丟進一則讓你心動的內容。Hunch It 會幫你看清論點、破裂點與它出現的位置，最後一句由你寫。</p><div class="hero-actions"><button class="button primary" data-action="new">丟一個想法進來 →</button><button class="text-action" data-action="example">拿 MU 範例試一次</button></div></div><aside class="preview"><div class="preview-head"><span>一次判斷</span><span>約 4 分鐘</span></div>${modules.map(m=>`<div class="preview-row"><span class="letter">${m[0]}</span><div><b>${m[1]}</b><small>${m[2]}</small></div></div>`).join('')}<p class="preview-note">不替你下結論。所有 AI 句子都能改，立場只能由你選。</p></aside></section><section class="section"><div class="section-head"><div><h2>最近的想法</h2><p>每一列是一個還能回來修改的判斷。</p></div></div><div class="idea-list">${[['MU','Micron','小紅書','新進','心動','今天'],['MRVL','Marvell','YouTube','判斷中','想查一下','昨天'],['NVDA','NVIDIA','朋友轉述','已表態','模擬追蹤','6 天前']].map((x,i)=>`<button class="idea-row" ${i===0?'data-action="example"':''}><span class="ticker"><strong>${x[0]}</strong><small>${x[1]}</small></span><span>${x[2]}</span><span><i class="dot"></i>${x[3]}</span><span>${x[4]}</span><span>${x[5]} →</span></button>`).join('')}</div></section></div>`}
    function newIdea(){if(state.processing)return `<div class="new-page"><section class="new-intro"><button class="back" data-action="go" data-screen="inbox">← 回到想法</button><div><p>從你剛看到的內容開始</p><h1>丟一個想法進來</h1></div></section><section class="form-card processing"><div><h2>正在把內容拆成可檢查的句子</h2><p>這個單檔版不會呼叫 AI；將載入固定的 MU 假資料。</p></div></section></div>`;return `<div class="new-page"><section class="new-intro"><button class="back" data-action="go" data-screen="inbox">← 回到想法</button><div><p>從你剛看到的內容開始</p><h1>丟一個想法進來</h1><p>不用整理。連結、截圖或你記得的兩三句都可以。</p></div><div class="privacy">◉ <span>純 HTML、全假資料。輸入不會傳送或保存。</span></div></section><section class="form-card"><div class="form-block"><div class="form-title"><span class="num">1</span><h2>這個想法從哪來？</h2></div><div class="tabs">${[['link','貼連結'],['image','傳截圖'],['voice','用說的']].map(x=>`<button class="tab ${state.source===x[0]?'active':''}" data-action="source" data-value="${x[0]}">${x[1]}</button>`).join('')}</div><label for="ideaInput">${state.source==='link'?'貼上影片、貼文或文章連結':'把你記得的重點寫兩三句'}</label>${state.source==='link'?`<input class="field" id="ideaInput" value="${esc(state.input)}" placeholder="https://…">`:`<textarea class="field" id="ideaInput" rows="5" placeholder="這個想法大概說了什麼？">${esc(state.input)}</textarea>`}<label for="creator">這是誰講的？ <span class="meta">選填</span></label><input class="field" id="creator" value="${esc(state.creator)}" placeholder="創作者名稱或朋友"></div><div class="form-block"><div class="form-title"><span class="num">2</span><h2>先記下你現在的直覺</h2></div><p class="meta">沒有正確答案。看完之後，只比較你的感覺有沒有改變。</p><div class="chips">${['心動','先等','想查一下','跳過','不確定'].map(x=>`<button class="chip ${state.pre===x?'selected':''}" data-action="pre" data-value="${x}">${state.pre===x?'✓ ':''}${x}</button>`).join('')}</div></div><div class="submit-row"><p>下一步固定用 MU 假資料示範 A、C、D、F；輸入不會真的被分析。</p><button class="button primary" data-action="start" ${!state.input||!state.pre?'disabled':''}>開始拆 →</button></div></section></div>`}
    function judgment(){return `<section class="judgment-head"><div class="judgment-inner"><div class="company"><span class="ticker-box">MU</span><div><h1>Micron</h1><p>小紅書 · @半導體阿明 · 7 月 8 日</p></div></div><div class="pre"><span>開始前的直覺</span><strong>${state.pre||'心動'}</strong></div><div class="progress"><b>${state.completed.length}<small>/4</small></b></div></div><div class="fake-strip">ⓘ 以下公司內容、行情與來源皆為使用者測試示意資料，不代表真實市場資訊。</div></section><div class="flow"><nav class="rail">${modules.map(m=>`<button class="${state.active===m[0]?'active':''} ${state.completed.includes(m[0])?'done':''}" data-action="module" data-value="${m[0]}"><span class="letter">${state.completed.includes(m[0])?'✓':m[0]}</span><span><b>${m[1]}</b><small>${state.completed.includes(m[0])?'已完成':m[2]}</small></span></button>`).join('')}</nav><p class="rail-hint">↔ 左右滑動查看所有步驟</p><div class="focus-note"><b>現在只看一件事</b><p>你可以隨時跳到其他步驟；沒做過的檢查會誠實顯示「未看」。</p></div><section class="module" id="module">${moduleContent()}</section></div>${boundary()}`}
    function moduleTitle(id,title,desc){return `<header class="module-title"><span class="letter">${id}</span><div><h2>${title}</h2><p>${desc}</p></div></header>`}
    function aiBox(id,label,note=''){if(state.editingAi===id)return `<div class="ai-editor"><label>${label}<textarea class="editor" id="aiEdit">${esc(state.ai[id])}</textarea></label>${note?`<b class="note">${note}</b>`:''}<div class="edit-footer"><span>改完會標成「已修改」。</span><button class="mini" data-action="finishAi">✓ 完成修改</button></div></div>`;return `<button class="ai-box ${state.modifiedAi.includes(id)?'modified':''}" data-action="editAi" data-value="${id}"><span class="box-label">${label}</span><span class="box-copy">${esc(state.ai[id])}</span>${note?`<b class="note">${note}</b>`:''}<span class="ai-mark">${state.modifiedAi.includes(id)?'✓ 已修改':'✎ AI 草稿 · 點一下編輯'}</span></button>`}
    function moduleContent(){if(state.active==='A')return moduleA();if(state.active==='C')return moduleC();if(state.active==='D')return moduleD();return moduleF()}
    function moduleA(){return `${moduleTitle('A','拆解這個想法','先看這段內容到底要你相信什麼，不急著評論對錯。')}${aiBox('thesis','這段內容要你相信')}<div class="facts"><div><small>標的</small><b>MU</b></div><div><small>主題</small><b>AI 記憶體</b></div><div><small>催化</small><b>HBM 需求</b></div><div><small>隱含時間</small><b>未說（估：中期）</b></div></div><div class="subhead"><div><h3>他講的話，各是哪一種？</h3><p>點標籤可改；選一句最打動你的。</p></div></div><div class="claim-list">${DATA.claims.map((c,i)=>`<div class="claim ${state.convinced===i?'selected':''}"><button class="claim-main" data-action="claim" data-index="${i}"><span class="radio">${state.convinced===i?'✓':''}</span>${c[0]}</button><button class="type ${state.claimTags[i]}" data-action="tag" data-index="${i}">${state.claimTags[i]}</button></div>`).join('')}</div>${nextField('A',['先確認原始說法','把最打動我的句子留在草稿','先看它怎麼會錯'])}${moduleFooter('A','完成拆解，看它怎麼會錯',state.convinced!==null,'C')}`}
    function moduleC(){return `${moduleTitle('C','這怎麼會錯','只找論點最早可能破裂的地方，不堆免責聲明。')}<div class="risk-stack">${aiBox('risk','這個想法可能錯在')}${aiBox('warning','第一個可觀察的警訊')}</div><fieldset class="decision"><legend>如果看到這個警訊，你還會想繼續嗎？</legend><div class="chips">${['會','不會','不確定'].map(x=>`<button class="chip ${state.riskResponse===x?'selected':''}" data-action="riskResponse" data-value="${x}">${state.riskResponse===x?'✓ ':''}${x}</button>`).join('')}</div></fieldset><button class="save-warning" data-action="warning"><span>${state.warningSaved?'✓':'○'}</span><span><b>${state.warningSaved?'警訊已記下':'把這個警訊記下來'}</b><small>之後由你自己回來對；產品不替你盯盤。</small></span></button>${nextField('C',['等下一次法說再看','把警訊寫進我的草稿','繼續看內容發布的位置'])}${moduleFooter('C','完成風險，看位置',!!state.riskResponse,'D')}`}
    function moduleD(){return `${moduleTitle('D','現在會太晚嗎','不預測接下來怎麼走，只把這則內容出現的位置畫出來。')}<figure class="chart"><figcaption><span>近 12 個月價格位置</span><span>全部為示意資料</span></figcaption><svg viewBox="0 0 680 250" role="img" aria-label="MU 示意價格線，發布點接近期間高點"><g stroke="rgba(255,255,255,.14)"><line x1="40" y1="55" x2="650" y2="55"/><line x1="40" y1="120" x2="650" y2="120"/><line x1="40" y1="185" x2="650" y2="185"/></g><path d="M40 198C80 188 100 200 135 170S190 160 225 130 280 120 315 92 370 82 405 60 460 70 495 50 550 45 580 35 625 42 650 26" fill="none" stroke="#d7f6e8" stroke-width="3"/><line x1="548" y1="25" x2="548" y2="215" stroke="#ff7759" stroke-width="2" stroke-dasharray="4 5"/><circle cx="548" cy="45" r="7" fill="#ff7759"/><rect x="410" y="78" width="165" height="42" rx="6" fill="#ff7759"/><text x="425" y="97" fill="#071829" font-size="11">7/8 內容發布</text><text x="425" y="112" fill="#071829" font-size="9">接近期間高點</text></svg></figure><div class="position-facts"><p>✓ 發布時，MU 已從近一年低點上漲 118%。</p><p>✓ 發布點距近一年高點約 9%。</p></div>${aiBox('narrative','敘事出現的位置（估）','描述，不是預測。')}<fieldset class="decision"><legend>看完這個，你現在的直覺</legend><div class="chips">${['沒變','心動 → 先等','先等 → 跳過','其他'].map(x=>`<button class="chip ${state.post===x?'selected':''}" data-action="post" data-value="${x}">${state.post===x?'✓ ':''}${x}</button>`).join('')}</div></fieldset>${nextField('D',['把「已反映嗎」留在草稿','先等新的公司證據','這次先跳過'])}${moduleFooter('D','完成位置，回到我的判斷',!!state.post,'F')}`}
    function moduleF(){return `${moduleTitle('F','我的判斷草稿','至少親手改一個地方。聽起來專業，不等於是你的想法。')}<div class="drafts">${state.drafts.map((d,i)=>draftBox(i,d)).join('')}</div><section class="stance"><h3>我現在的立場</h3><p class="meta">這一句不由 AI 生成。</p><div class="stance-grid">${[['act','行動','我會自行處理'],['wait','先等','直到一件事發生'],['skip','跳過','這次不再花時間'],['simulate','模擬追蹤','只看之後怎麼走']].map(x=>`<button class="stance-choice ${state.stance===x[0]?'selected':''}" data-action="stance" data-value="${x[0]}"><span class="radio">${state.stance===x[0]?'✓':''}</span><span><b>${x[1]}</b><small>${x[2]}</small></span></button>`).join('')}</div>${state.stance==='wait'?`<label for="wait">我會等到</label><input class="field" id="wait" value="${esc(state.wait)}" placeholder="例如：下一次法說出現新的公司證據"><span class="meta">寫事件，不寫價格。</span>`:''}</section><div class="requirements"><span class="${state.modifiedDrafts.length?'ok':''}">${state.modifiedDrafts.length?'✓':'○'} 改過至少一句</span><span class="${state.stance?'ok':''}">${state.stance?'✓':'○'} 由你選好立場</span>${state.stance==='wait'?`<span data-wait-check class="${state.wait?'ok':''}">${state.wait?'✓':'○'} 寫下等待事件</span>`:''}</div><button class="button primary" style="width:100%" data-action="finish" ${!canFinish()?'disabled':''}>完成表態 →</button>`}
    function draftBox(i,d){if(state.editingDraft===i)return `<div class="draft modified"><span class="draft-index">${i+1}</span><div><label>${['我目前相信','我還不確定','我要先想清楚'][i]}<textarea class="editor" id="draftEdit">${esc(d)}</textarea></label><button class="mini" data-action="finishDraft">✓ 完成</button></div></div>`;return `<div class="draft ${state.modifiedDrafts.includes(i)?'modified':''}"><span class="draft-index">${i+1}</span><div><span class="box-label">${['我目前相信','我還不確定','我要先想清楚'][i]}</span><button data-action="editDraft" data-index="${i}">${esc(d)}<span class="status">${state.modifiedDrafts.includes(i)?'✓ 已修改':'✎ AI 草稿'}</span></button></div></div>`}
    function nextField(id,suggestions){return `<div class="next"><label>所以我的下一步</label><input class="field" placeholder="用自己的話留一句（選填）"><div class="suggestions">${suggestions.map(s=>`<button>${s}</button>`).join('')}</div></div>`}
    function moduleFooter(id,label,enabled,next){return `<footer class="module-footer"><span>${state.completed.includes(id)?'✓ 這一步已完成，仍可修改':enabled?'準備好就放進判斷':'先完成這一題'}</span><button class="button primary" data-action="complete" data-value="${id}" data-next="${next}" ${!enabled?'disabled':''}>${state.completed.includes(id)?'更新這一步':label} →</button></footer>`}
    function canFinish(){return state.modifiedDrafts.length&&state.stance&&(state.stance!=='wait'||state.wait)}
    function summary(){const stance={act:'行動',wait:'先等',skip:'跳過',simulate:'模擬追蹤'}[state.stance]||'未選';const seen=id=>state.completed.includes(id);return `<section class="summary-hero"><div class="summary-check">✓</div><p>已完成表態</p><h1>這份判斷，現在是你的了。</h1><p>不是因為 AI 說得完整，而是你改過句子，也親自選了立場。</p><div class="summary-stance"><span>我現在的立場</span><b>${stance}</b>${state.stance==='wait'?`<p>直到：${esc(state.wait)}</p>`:''}</div></section><section class="summary"><div class="summary-head"><div><h2>MU · Micron 判斷總覽</h2><span class="meta">表態當下的靜態快照</span></div><span class="fake-badge">示意資料</span></div><div class="summary-cols"><div><h3>我怎麼理解這個故事</h3>${row('我目前相信',state.drafts[0],true)}${row('最打動我的一句',seen('A')&&state.convinced!==null?DATA.claims[state.convinced][0]:'未看',seen('A'))}${row('我還不確定',state.drafts[1],true)}</div><div><h3>什麼會讓我改變看法</h3>${row('第一個警訊',seen('C')?state.ai.warning:'未看',seen('C'))}${row('看到警訊後',seen('C')?state.riskResponse:'未看',seen('C'))}${row('內容出現的位置',seen('D')?`發布時已從低點上漲 118%；距高點約 9%。${state.ai.narrative}`:'未看',seen('D'))}${row('看完位置後',seen('D')?state.post:'未看',seen('D'))}</div></div><div class="final-sentence"><span class="box-label">我要先想清楚</span>${esc(state.drafts[2])}</div></section><section class="summary-actions"><div><h2>下一次再看到一個好故事，你已經有地方開始。</h2><p>單檔 prototype 不會保存資料；「我的庫」用假資料示範後續樣子。</p></div><div><button class="button primary" data-action="reset">再看一個想法</button> <button class="text-action" data-action="go" data-screen="library">看看我的庫</button></div></section>${boundary()}`}
    function row(label,value,done){return `<div class="summary-row" style="${done?'':'color:var(--muted);font-style:italic'}"><span>${label}</span><p>${esc(value)}</p></div>`}
    function library(){return `<div class="page"><header class="library-head"><div><p class="context">我的庫</p><h1>每一次表態，都留下下次用得到的判斷。</h1><p class="meta">這裡不算勝率、不排行報酬。只保留你曾經相信什麼、後來看見什麼。</p></div><button class="button primary" data-action="go" data-screen="new">＋ 新想法</button></header><section class="section"><div class="section-head"><div><h2>我的原則</h2><p>2 條，曾在 3 次判斷中用到</p></div></div><div class="idea-list"><article class="principle"><span class="principle-num">1</span><div><p>看到已經大幅上漲後才被推薦的股票，先問：我知道的是新證據，還是市場早就反映的敘事？</p><span class="meta">來自 2024 年一次跟單經驗 · 用過 2 次</span></div></article><article class="principle"><span class="principle-num">2</span><div><p>如果公司只重複願景，沒有把變化寫進 guidance，我會把它留在觀察而不是結論。</p><span class="meta">來自 MRVL 判斷 · 用過 1 次</span></div></article></div></section><section class="section"><div class="section-head"><div><h2>判斷紀錄</h2><p>回來看當時的草稿，不是看 AI 猜得準不準。</p></div></div><div class="idea-list">${[['7/8','MU','先等，直到下一次法說','待回填'],['7/2','MRVL','跳過','已回填'],['6/25','NVDA','模擬追蹤','14 天後回看']].map(x=>`<div class="history"><span>${x[0]}</span><b>${x[1]}</b><span>${x[2]}</span><span>${x[3]}</span></div>`).join('')}</div></section></div>`}
    function boundary(){return `<footer class="boundary">◉ <span><b>立場由你決定。</b> Hunch It 不提供投資建議；這裡每一句都能改。</span></footer>`}
    function toast(msg){state.toast=msg;render();setTimeout(()=>{state.toast='';render()},1800)}
    function reset(){Object.assign(state,{screen:'inbox',source:'link',input:'',creator:'',pre:'',processing:false,active:'A',completed:[],claimTags:DATA.claims.map(x=>x[1]),convinced:null,riskResponse:'',warningSaved:false,post:'',ai:{thesis:DATA.thesis,risk:DATA.risk,warning:DATA.warning,narrative:DATA.narrative},modifiedAi:[],editingAi:null,drafts:[...DATA.drafts],modifiedDrafts:[],editingDraft:null,stance:'',wait:'',toast:''});render();window.scrollTo(0,0)}
    function bindInputs(){const i=$('#ideaInput');if(i)i.oninput=e=>state.input=e.target.value;const c=$('#creator');if(c)c.oninput=e=>state.creator=e.target.value;const a=$('#aiEdit');if(a)a.oninput=e=>{state.ai[state.editingAi]=e.target.value;if(!state.modifiedAi.includes(state.editingAi))state.modifiedAi.push(state.editingAi)};const d=$('#draftEdit');if(d)d.oninput=e=>{state.drafts[state.editingDraft]=e.target.value;if(!state.modifiedDrafts.includes(state.editingDraft))state.modifiedDrafts.push(state.editingDraft)};const w=$('#wait');if(w)w.oninput=e=>{state.wait=e.target.value;const f=$('[data-action="finish"]'),check=$('[data-wait-check]'),ready=Boolean(state.wait.trim());if(f)f.disabled=!canFinish();if(check){check.classList.toggle('ok',ready);check.textContent=`${ready?'✓':'○'} 寫下等待事件`}}}
    document.addEventListener('click',e=>{const b=e.target.closest('[data-action]');if(!b)return;const a=b.dataset.action;if(a==='go')go(b.dataset.screen);if(a==='new')go('new');if(a==='example'){state.input=DATA.link;state.creator=DATA.creator;state.pre='心動';go('new')}if(a==='source'){state.source=b.dataset.value;render()}if(a==='pre'){state.pre=b.dataset.value;render()}if(a==='start'){state.processing=true;render();setTimeout(()=>{state.processing=false;state.screen='judgment';state.active='A';render();window.scrollTo(0,0)},650)}if(a==='module'){state.active=b.dataset.value;render()}if(a==='claim'){state.convinced=Number(b.dataset.index);render()}if(a==='tag'){const types=['事實','解讀','預測','情緒'],i=Number(b.dataset.index),at=types.indexOf(state.claimTags[i]);state.claimTags[i]=types[(at+1)%types.length];render()}if(a==='riskResponse'){state.riskResponse=b.dataset.value;render()}if(a==='warning'){state.warningSaved=!state.warningSaved;render()}if(a==='post'){state.post=b.dataset.value;render()}if(a==='editAi'){state.editingAi=b.dataset.value;render()}if(a==='finishAi'){state.editingAi=null;render()}if(a==='editDraft'){state.editingDraft=Number(b.dataset.index);render()}if(a==='finishDraft'){state.editingDraft=null;render()}if(a==='stance'){state.stance=b.dataset.value;render()}if(a==='complete'){const id=b.dataset.value;if(!state.completed.includes(id))state.completed.push(id);state.active=b.dataset.next;toast(`${id} 已放進你的判斷草稿`)}if(a==='finish'){if(!canFinish())return;if(!state.completed.includes('F'))state.completed.push('F');go('summary')}if(a==='reset')reset()});
    render();
  </script>
</body>
</html>
