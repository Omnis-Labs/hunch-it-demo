<title>三扇門 · Phase 0 入口原型</title>
<style>
  :root{
    --bg:#E7EBEA; --surface:#FCFEFD; --surface-2:#EEF3F1; --raise:#FFFFFF;
    --border:#D0D9D6; --border-strong:#B7C4C0;
    --ink:#14201E; --ink-2:#566A65; --ink-3:#84948F;
    --accent:#0B6E75; --accent-2:#0A565C; --accent-ink:#FFFFFF; --accent-wash:#DDEDEC;
    --pos:#1F7A4D; --pos-wash:#DCEDE2;
    --neg:#BE452A; --neg-wash:#F5E1D9;
    --warn:#9C6B15; --warn-wash:#F1E6CE;
    --shadow:0 1px 2px rgba(18,32,30,.05), 0 8px 28px -14px rgba(18,32,30,.22);
    --shadow-lg:0 2px 4px rgba(18,32,30,.06), 0 22px 46px -20px rgba(18,32,30,.3);
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --r:16px; --r-sm:10px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0B110F; --surface:#121A18; --surface-2:#0F1614; --raise:#17211E;
      --border:#26332F; --border-strong:#33433E;
      --ink:#E7EEEB; --ink-2:#94A5A0; --ink-3:#66756F;
      --accent:#3BB6AF; --accent-2:#52C9C1; --accent-ink:#06201F; --accent-wash:#13302E;
      --pos:#4FC98A; --pos-wash:#123324; --neg:#E9805C; --neg-wash:#3A211A;
      --warn:#DDA84C; --warn-wash:#332818;
      --shadow:0 1px 2px rgba(0,0,0,.4), 0 14px 34px -16px rgba(0,0,0,.6);
      --shadow-lg:0 2px 6px rgba(0,0,0,.5), 0 26px 52px -22px rgba(0,0,0,.7);
    }
  }
  :root[data-theme="light"]{
    --bg:#E7EBEA; --surface:#FCFEFD; --surface-2:#EEF3F1; --raise:#FFFFFF;
    --border:#D0D9D6; --border-strong:#B7C4C0; --ink:#14201E; --ink-2:#566A65; --ink-3:#84948F;
    --accent:#0B6E75; --accent-2:#0A565C; --accent-ink:#FFFFFF; --accent-wash:#DDEDEC;
    --pos:#1F7A4D; --pos-wash:#DCEDE2; --neg:#BE452A; --neg-wash:#F5E1D9; --warn:#9C6B15; --warn-wash:#F1E6CE;
    --shadow:0 1px 2px rgba(18,32,30,.05), 0 8px 28px -14px rgba(18,32,30,.22);
    --shadow-lg:0 2px 4px rgba(18,32,30,.06), 0 22px 46px -20px rgba(18,32,30,.3);
  }
  :root[data-theme="dark"]{
    --bg:#0B110F; --surface:#121A18; --surface-2:#0F1614; --raise:#17211E;
    --border:#26332F; --border-strong:#33433E; --ink:#E7EEEB; --ink-2:#94A5A0; --ink-3:#66756F;
    --accent:#3BB6AF; --accent-2:#52C9C1; --accent-ink:#06201F; --accent-wash:#13302E;
    --pos:#4FC98A; --pos-wash:#123324; --neg:#E9805C; --neg-wash:#3A211A; --warn:#DDA84C; --warn-wash:#332818;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 14px 34px -16px rgba(0,0,0,.6);
    --shadow-lg:0 2px 6px rgba(0,0,0,.5), 0 26px 52px -22px rgba(0,0,0,.7);
  }

  *{box-sizing:border-box}
  body{margin:0}
  .app{background:var(--bg);color:var(--ink);font-family:var(--font-sans);min-height:100vh;
    line-height:1.55;-webkit-font-smoothing:antialiased}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
    padding:12px clamp(16px,4vw,32px);background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:baseline;gap:9px;font-weight:700;letter-spacing:-.01em}
  .brand .mk{color:var(--accent)}
  .tag{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--accent);background:var(--accent-wash);padding:3px 8px;border-radius:100px}
  .spacer{flex:1}
  .ghost-btn{border:1px solid var(--border-strong);background:var(--surface);color:var(--ink-2);
    font:inherit;font-size:13px;padding:7px 12px;border-radius:100px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;transition:border-color .15s,color .15s}
  .ghost-btn:hover{border-color:var(--accent);color:var(--accent)}

  .col{max-width:840px;margin:0 auto;padding:clamp(24px,5vw,56px) clamp(16px,4vw,32px) 140px}

  /* ---------- screens ---------- */
  .screen{display:none}
  .screen.active{display:block}
  @keyframes reveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .screen.active{animation:reveal .38s ease both}

  /* ---------- triage hero ---------- */
  .hero{text-align:center;margin-bottom:34px}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}
  .hero h1{font-size:clamp(1.9rem,5.4vw,3rem);line-height:1.1;letter-spacing:-.025em;margin:0 0 12px;
    text-wrap:balance;font-weight:760}
  .hero p{color:var(--ink-2);font-size:1.05rem;max-width:52ch;margin:0 auto}

  .doors{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media (max-width:720px){.doors{grid-template-columns:1fr}}
  .door{position:relative;text-align:left;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--r);padding:22px;cursor:pointer;font:inherit;color:var(--ink);
    display:flex;flex-direction:column;gap:12px;box-shadow:var(--shadow);
    transition:transform .16s cubic-bezier(.2,.7,.2,1),border-color .16s,box-shadow .16s}
  .door:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
  .door .ico{width:42px;height:42px;border-radius:11px;background:var(--accent-wash);color:var(--accent);
    display:grid;place-items:center}
  .door .ico svg{width:22px;height:22px}
  .door .dnum{position:absolute;top:18px;right:20px;font-family:var(--font-mono);font-size:12px;
    font-weight:700;color:var(--ink-3)}
  .door .have{font-size:12px;color:var(--ink-3);letter-spacing:.02em}
  .door .name{font-size:1.18rem;font-weight:720;letter-spacing:-.01em}
  .door .promise{font-size:13.5px;color:var(--ink-2);line-height:1.5;flex:1}
  .door .thresh{font-size:11.5px;color:var(--ink-3);display:flex;align-items:center;gap:6px;
    padding-top:12px;border-top:1px solid var(--border);margin-top:2px}
  .door .thresh .lvl{display:inline-flex;gap:3px}
  .door .thresh .lvl i{width:6px;height:6px;border-radius:50%;background:var(--border-strong);display:inline-block}
  .door .thresh .lvl i.on{background:var(--accent)}
  .door .go{font-size:13px;font-weight:600;color:var(--accent);display:inline-flex;align-items:center;gap:6px;margin-top:2px}
  .door .go svg{width:15px;height:15px}
  .triage-note{text-align:center;font-size:12.5px;color:var(--ink-3);margin-top:22px}

  /* ---------- reveal screen ---------- */
  .back-btn{border:none;background:none;color:var(--ink-2);font:inherit;font-size:13.5px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;padding:6px 0;margin-bottom:18px}
  .back-btn:hover{color:var(--accent)}
  .back-btn svg{width:16px;height:16px}
  .r-head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .r-head .ico{width:40px;height:40px;border-radius:11px;background:var(--accent-wash);color:var(--accent);display:grid;place-items:center;flex:none}
  .r-head .ico svg{width:21px;height:21px}
  .r-head h2{margin:0;font-size:1.35rem;letter-spacing:-.015em}
  .r-head .rp{font-size:13px;color:var(--ink-3);margin-top:2px}
  .r-lead{color:var(--ink-2);font-size:1rem;margin:14px 0 20px;max-width:60ch}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
  .card-cap{font-size:11.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
    color:var(--ink-3);padding:14px 20px 0}
  .card-body{padding:14px 20px 20px;display:flex;flex-direction:column;gap:2px}

  .src{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);
    padding:13px 15px;margin:0 20px 4px;font-size:13.5px;color:var(--ink-2);line-height:1.55}
  .src b{color:var(--ink)}

  .brk{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
  .brk-row{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--raise);font-size:13.5px}
  .brk-row:last-child{border-bottom:none}
  .brk-row .k{flex:none;width:92px;font-weight:600;color:var(--ink-2);font-size:12.5px}
  .brk-row .v{color:var(--ink);line-height:1.5}
  .brk-row.key{background:var(--warn-wash)}
  .brk-row.key .k{color:var(--warn)}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px;margin-left:6px}
  .pill.hist{background:var(--neg-wash);color:var(--neg)}

  .aha{display:flex;gap:11px;align-items:flex-start;background:var(--accent-wash);
    border:1px solid color-mix(in srgb,var(--accent) 26%,transparent);border-radius:var(--r-sm);
    padding:14px 16px;font-size:14.5px;line-height:1.55;margin-bottom:20px}
  .aha .qm{font-family:var(--font-mono);font-weight:800;color:var(--accent);font-size:18px;line-height:1.2}
  .aha b{color:var(--ink)}

  /* portfolio bars (door C) */
  .pf{display:flex;flex-direction:column;gap:9px}
  .pf-row{display:flex;align-items:center;gap:12px}
  .pf-row .tk{width:58px;font-family:var(--font-mono);font-size:12.5px;font-weight:600}
  .pf-row .track{flex:1;height:16px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .pf-row .fill{height:100%}
  .pf-row .fill.shared{background:var(--neg)}
  .pf-row .fill.solo{background:var(--ink-3)}
  .pf-row .w{width:42px;text-align:right;font-family:var(--font-mono);font-size:12.5px;font-weight:600}
  .pf-legend{display:flex;gap:16px;font-size:12px;color:var(--ink-2);margin-top:10px}
  .pf-legend span{display:inline-flex;align-items:center;gap:6px}
  .pf-dot{width:9px;height:9px;border-radius:2px}
  .expo{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-top:16px;
    padding-top:14px;border-top:1px dashed var(--border-strong)}
  .expo .el{font-size:13px;color:var(--ink-2)}
  .expo .ev{font-family:var(--font-mono);font-weight:800;font-size:1.5rem;color:var(--neg)}

  /* door B teaser */
  .teaser{display:flex;flex-direction:column;gap:14px}
  .cmp-mini .cmp-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}
  .cmp-mini .cmp-top .num{font-family:var(--font-mono);font-weight:700}
  .cmp-mini .track{height:12px;border-radius:100px;background:var(--raise);border:1px solid var(--border);overflow:hidden}
  .cmp-mini .fill{height:100%;border-radius:100px}
  .cmp-mini .fill.mkt{background:var(--ink-3)} .cmp-mini .fill.you{background:var(--accent)}
  .open-full{align-self:flex-start;border:none;background:var(--accent);color:var(--accent-ink);
    font:inherit;font-weight:600;font-size:14px;padding:11px 20px;border-radius:100px;cursor:pointer;
    text-decoration:none;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
  .open-full:hover{background:var(--accent-2)}
  .open-full svg{width:16px;height:16px}

  /* commitment strip */
  .commit{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    padding:20px;box-shadow:var(--shadow)}
  .commit h3{margin:0 0 14px;font-size:1.05rem;letter-spacing:-.01em}
  .commit .row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .want-btn{border:1px solid var(--border-strong);background:var(--raise);color:var(--ink);font:inherit;
    font-size:14px;padding:10px 18px;border-radius:100px;cursor:pointer;transition:.15s;display:inline-flex;gap:8px;align-items:center}
  .want-btn:hover{border-color:var(--accent)}
  .want-btn[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .want-btn.no[aria-pressed="true"]{background:var(--ink-3);border-color:var(--ink-3);color:#fff}
  .pay{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink-2);cursor:pointer;user-select:none;margin-bottom:12px}
  .pay input{width:17px;height:17px;accent-color:var(--accent);cursor:pointer}
  .email-in{width:100%;font:inherit;font-size:13.5px;padding:10px 13px;border-radius:var(--r-sm);
    border:1px solid var(--border);background:var(--raise);color:var(--ink)}
  .email-in::placeholder{color:var(--ink-3)}
  .commit .foot{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;align-items:center}
  .commit .thanks{font-size:13px;color:var(--pos);display:none}
  .commit .thanks.show{display:inline}

  /* facilitator */
  .fac-toggle{position:fixed;right:18px;bottom:18px;z-index:30;border:1px solid var(--border-strong);
    background:var(--surface);color:var(--ink);font:inherit;font-size:13px;font-weight:600;
    padding:11px 16px;border-radius:100px;cursor:pointer;box-shadow:var(--shadow);display:inline-flex;gap:8px;align-items:center}
  .fac-toggle:hover{border-color:var(--accent);color:var(--accent)}
  .fac-toggle .dot{width:7px;height:7px;border-radius:50%;background:var(--pos)}
  .fac-drawer{position:fixed;right:18px;bottom:66px;z-index:30;width:min(380px,calc(100vw - 36px));
    max-height:min(74vh,600px);overflow:auto;background:var(--surface);border:1px solid var(--border-strong);
    border-radius:var(--r);box-shadow:var(--shadow-lg);padding:18px}
  .fac-drawer h3{margin:0 0 3px;font-size:14px}
  .fac-drawer .fsub{font-size:12px;color:var(--ink-3);margin:0 0 14px}
  .fac-sec{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);
    margin:16px 0 8px}
  .tally{display:flex;flex-direction:column;gap:8px}
  .tally-row{display:flex;align-items:center;gap:10px;font-size:13px}
  .tally-row .tl{width:70px;color:var(--ink-2)}
  .tally-row .tbar{flex:1;height:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:100px;overflow:hidden}
  .tally-row .tfill{height:100%;background:var(--accent);border-radius:100px;transition:width .3s}
  .tally-row .tv{width:66px;text-align:right;font-family:var(--font-mono);font-size:12px;font-weight:600}
  .metric{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px}
  .metric:last-of-type{border-bottom:none}
  .metric .mk{color:var(--ink-2)}
  .metric .mv{font-family:var(--font-mono);font-weight:600;text-align:right}
  .metric .mv.na{color:var(--ink-3);font-weight:400}
  .metric .mv.hl{color:var(--accent)}
  .fac-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  .fac-actions .ghost-btn{justify-content:center}
  .copied{font-size:12px;color:var(--pos);text-align:center;height:14px}

  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}
</style>

<div class="app">
  <header class="topbar">
    <div class="brand"><span>Hunch It<span class="mk">.</span></span></div>
    <span class="tag">Phase 0 · 三扇門</span>
    <span class="spacer"></span>
    <button class="ghost-btn" id="themeBtn"><span id="themeIcon">◐</span><span id="themeLbl">深色</span></button>
  </header>

  <main class="col">
    <!-- SCREEN: TRIAGE -->
    <section class="screen active" id="scrTriage">
      <div class="hero">
        <div class="eyebrow">Hunch It</div>
        <h1>你現在手上有什麼?</h1>
        <p>選一個離你最近的處境 —— 我們先給你這一種情況下最有用的那一下。</p>
      </div>
      <div class="doors" id="doors"></div>
      <div class="triage-note">你可以先看一扇,再回來看看其他的。</div>
    </section>

    <!-- SCREEN: REVEAL -->
    <section class="screen" id="scrReveal">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
        回三扇門
      </button>
      <div id="revealContent"></div>
    </section>
  </main>

  <button class="fac-toggle" id="facToggle"><span class="dot"></span>引導者面板</button>
  <aside class="fac-drawer" id="facDrawer" hidden>
    <h3>Phase 0 假門測試 · 行為指標</h3>
    <p class="fsub">量的是「哪扇門最多人選、選了想不想用」。每位受測者做完按「下一位」。</p>

    <div class="fac-sec">首選門分佈(累計 <span id="visitorN">0</span> 位)</div>
    <div class="tally" id="firstTally"></div>

    <div class="fac-sec">各門「很想用」率</div>
    <div class="tally" id="wantTally"></div>

    <div class="fac-sec">目前這位受測者</div>
    <div id="curMetrics"></div>

    <div class="fac-actions">
      <button class="ghost-btn" id="nextVisitor">▸ 下一位受測者(存檔並清空)</button>
      <button class="ghost-btn" id="exportBtn">複製全部資料 JSON</button>
      <div class="copied" id="copiedNote"></div>
    </div>
  </aside>
</div>

<script>
(function(){
  "use strict";
  var MVP7_URL="implied-expectations.html";
  var MVP12_URL="hidden-exposure.html";
  var MVP1_URL="idea-validator.html";

  var ICONS={
    A:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></svg>',
    B:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M5 8l7-5 7 5M4 21h16M6 12h.01M6 16h.01M18 12h.01M18 16h.01"/></svg>',
    C:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'
  };
  var DOORS={
    A:{num:"門 A",have:"一個別人的想法",name:"想法驗證器",
       promise:"KOL、朋友或群組推的一個標的 —— 貼進來,看清楚他到底在賭什麼。",
       thresh:1, threshTxt:"門檻:貼一段文字或連結"},
    B:{num:"門 B",have:"一家我在看的公司",name:"期待差",
       promise:"你知道這是好公司。但現在的價格,已經假設它要做到什麼?",
       thresh:2, threshTxt:"門檻:打一個公司代號"},
    C:{num:"門 C",have:"一整個投資組合",name:"隱藏曝險偵測器",
       promise:"匯入你的組合,看看你以為分散的,是不是其實同一個賭注。",
       thresh:3, threshTxt:"門檻:貼上/上傳持倉"}
  };

  var $=function(id){return document.getElementById(id);};
  var el=function(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

  // ---- theme ----
  function curTheme(){var t=document.documentElement.getAttribute("data-theme");return t||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");}
  function themeLbl(){var n=curTheme()==="dark"?"light":"dark";$("themeIcon").textContent=n==="dark"?"◑":"◐";$("themeLbl").textContent=n==="dark"?"深色":"淺色";}
  $("themeBtn").addEventListener("click",function(){document.documentElement.setAttribute("data-theme",curTheme()==="dark"?"light":"dark");themeLbl();});
  themeLbl();

  // ---- state ----
  function freshVisitor(){return{firstDoor:null,opened:[],commit:{},openedFullA:false,openedFullB:false,openedFullC:false,startTs:Date.now()};}
  var S={visitors:[],cur:freshVisitor()};

  // ---- build doors ----
  var doorsWrap=$("doors");
  ["A","B","C"].forEach(function(k){
    var d=DOORS[k];
    var lvl='<span class="lvl">'+[1,2,3].map(function(i){return '<i class="'+(i<=d.thresh?"on":"")+'"></i>';}).join("")+'</span>';
    var b=el("button","door",
      '<span class="dnum">'+d.num+'</span>'+
      '<span class="ico">'+ICONS[k]+'</span>'+
      '<span class="have">你手上有 · '+d.have+'</span>'+
      '<span class="name">'+d.name+'</span>'+
      '<span class="promise">'+d.promise+'</span>'+
      '<span class="thresh">'+lvl+d.threshTxt+'</span>'+
      '<span class="go">打開看看 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>');
    b.addEventListener("click",function(){openDoor(k);});
    doorsWrap.appendChild(b);
  });

  function openDoor(k){
    if(!S.cur.firstDoor)S.cur.firstDoor=k;
    if(S.cur.opened.indexOf(k)<0)S.cur.opened.push(k);
    renderReveal(k);
    $("scrTriage").classList.remove("active");
    $("scrReveal").classList.add("active");
    window.scrollTo({top:0,behavior:matchMedia("(prefers-reduced-motion:reduce)").matches?"auto":"smooth"});
    renderFac();
  }
  $("backBtn").addEventListener("click",function(){
    $("scrReveal").classList.remove("active");
    $("scrTriage").classList.add("active");
    window.scrollTo({top:0,behavior:"auto"});
  });

  // ---- reveal content per door ----
  function revealA(){
    return ''+
    '<div class="card">'+
      '<div class="card-cap">你貼進來的內容(範例)</div>'+
      '<div class="src">「<b>$PLTR 要噴了</b>,AI 訂單接不完,政府商業兩邊都在搶,現在不進場就來不及,目標翻倍。」<br>—— 某追蹤 8 萬人的交易帳號</div>'+
      '<div class="card-body">'+
        '<div class="brk">'+
          '<div class="brk-row"><span class="k">核心論點</span><span class="v">PLTR 因 AI 需求將短期大漲,應立即進場。</span></div>'+
          '<div class="brk-row"><span class="k">事實</span><span class="v">政府與商業訂單、營收成長 —— 可查證。</span></div>'+
          '<div class="brk-row"><span class="k">解讀</span><span class="v">「接不完」把成長講成「需求無上限」—— 是詮釋,不是數字。</span></div>'+
          '<div class="brk-row"><span class="k">預測</span><span class="v">「要噴了 / 來不及 / 翻倍」—— 沒有時間、沒有價格依據。</span></div>'+
          '<div class="brk-row key"><span class="k">最需要成立的假設</span><span class="v">商業客戶擴張速度維持,<b>且目前這麼高的估值不回落</b>。</span></div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="card">'+
      '<div class="card-cap">這個來源以前講對過嗎(示意)</div>'+
      '<div class="card-body">'+
        '<div class="src" style="margin:0">過去 3 次喊「要噴了」:2 次事後 1 個月內回檔 <span class="pill hist">勝率 1/3</span></div>'+
      '</div>'+
    '</div>'+
    '<a class="open-full" href="'+MVP1_URL+'" target="_blank" rel="noopener" id="openFullA" style="margin-top:4px">貼上你自己的想法試試 '+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></a>'+
    '<div class="aha"><span class="qm">"</span><span>他整套說法,其實只押在<b>一個沒被證明的假設</b>上 —— 而那個假設(估值不回落),你自己也不確定。</span></div>';
  }

  function revealB(){
    return ''+
    '<div class="card">'+
      '<div class="card-cap">以 NVIDIA 為例</div>'+
      '<div class="card-body">'+
        '<div class="teaser">'+
          '<div class="cmp-mini"><div class="cmp-top"><span>市場已定價的成長</span><span class="num">28%</span></div>'+
            '<div class="track"><div class="fill mkt" style="width:51%"></div></div></div>'+
          '<div class="cmp-mini"><div class="cmp-top"><span>你的預期</span><span class="num">?</span></div>'+
            '<div class="track"><div class="fill you" style="width:22%"></div></div></div>'+
          '<div class="src" style="margin:6px 0 0">現在的價格,已經假設 NVIDIA 未來 3 年營收要年化成長 ~28%。你覺得呢?差多少,就是你的「期待差」。</div>'+
          '<a class="open-full" href="'+MVP7_URL+'" target="_blank" rel="noopener" id="openFullB">打開完整互動原型 '+
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></a>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="aha"><span class="qm">"</span><span>好公司不等於好交易 —— 先看<b>現價已經假設了多少</b>,再決定你要不要在這裡進場。</span></div>';
  }

  function revealC(){
    var rows=[
      ["NVDA",18,"shared"],["MSFT",15,"solo"],["MRVL",9,"shared"],
      ["SMH",12,"shared"],["TSM",8,"shared"],["其他",38,"solo"]
    ];
    var pf=rows.map(function(r){
      var pct=Math.round(r[1]/38*100);
      return '<div class="pf-row"><span class="tk">'+r[0]+'</span>'+
        '<span class="track"><span class="fill '+r[2]+'" style="width:'+pct+'%"></span></span>'+
        '<span class="w">'+r[1]+'%</span></div>';
    }).join("");
    return ''+
    '<div class="card">'+
      '<div class="card-cap">你的組合(範例)· 紅色=其實在賭同一件事</div>'+
      '<div class="card-body">'+
        '<div class="pf">'+pf+'</div>'+
        '<div class="pf-legend">'+
          '<span><span class="pf-dot" style="background:var(--neg)"></span>賭「AI 資本支出持續成長」</span>'+
          '<span><span class="pf-dot" style="background:var(--ink-3)"></span>其他</span>'+
        '</div>'+
        '<div class="expo"><span class="el">NVDA + MRVL + SMH + TSM 合計曝險(你設的主題上限 30%)</span><span class="ev">47%</span></div>'+
        '<a class="open-full" href="'+MVP12_URL+'" target="_blank" rel="noopener" id="openFullC" style="margin-top:16px">用我自己的組合試試 '+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg></a>'+
      '</div>'+
    '</div>'+
    '<div class="aha"><span class="qm">"</span><span>你以為分散在 5 檔,其實 <b>47% 都在賭同一件事</b> —— 一則 AI 資本支出降溫的新聞,會同時打到這四檔。</span></div>';
  }

  var REVEALERS={A:revealA,B:revealB,C:revealC};

  function renderReveal(k){
    var d=DOORS[k];
    var wrap=$("revealContent"); wrap.innerHTML="";
    var head=el("div","r-head",
      '<span class="ico">'+ICONS[k]+'</span>'+
      '<div><h2>'+d.name+'</h2><div class="rp">'+d.num+' · 你手上有「'+d.have+'」</div></div>');
    wrap.appendChild(head);
    wrap.appendChild(el("p","r-lead",d.promise));
    var body=el("div",null,REVEALERS[k]());
    wrap.appendChild(body);
    if(k==="A"){var ofa=body.querySelector("#openFullA");if(ofa)ofa.addEventListener("click",function(){S.cur.openedFullA=true;renderFac();});}
    if(k==="B"){var of=body.querySelector("#openFullB");if(of)of.addEventListener("click",function(){S.cur.openedFullB=true;renderFac();});}
    if(k==="C"){var ofc=body.querySelector("#openFullC");if(ofc)ofc.addEventListener("click",function(){S.cur.openedFullC=true;renderFac();});}
    wrap.appendChild(buildCommit(k));
  }

  // ---- commitment strip ----
  function buildCommit(k){
    var c=el("div","commit");
    c.innerHTML='<h3>看到這個,你會想用嗎?</h3>'+
      '<div class="row">'+
        '<button class="want-btn yes" data-w="yes" aria-pressed="false">很想用 →</button>'+
        '<button class="want-btn no" data-w="no" aria-pressed="false">還好</button>'+
      '</div>'+
      '<label class="pay"><input type="checkbox" id="pay_'+k+'"> 為了這個功能,我願意付費</label>'+
      '<input class="email-in" id="mail_'+k+'" type="email" placeholder="想要上線通知的話,留 email(選填)">'+
      '<div class="foot"><span class="thanks" id="thx_'+k+'">已記錄,謝謝!回去看看其他的?</span></div>';
    var commit=S.cur.commit;
    function save(){
      commit[k]=commit[k]||{};
      var mail=$("mail_"+k), pay=$("pay_"+k);
      if(mail)commit[k].email=mail.value.trim();
      if(pay)commit[k].pay=pay.checked;
      renderFac();
    }
    c.querySelectorAll(".want-btn").forEach(function(b){
      b.addEventListener("click",function(){
        c.querySelectorAll(".want-btn").forEach(function(x){x.setAttribute("aria-pressed","false");});
        b.setAttribute("aria-pressed","true");
        commit[k]=commit[k]||{};
        commit[k].want=(b.getAttribute("data-w")==="yes");
        $("thx_"+k).classList.add("show");
        save();
      });
    });
    c.querySelector("#pay_"+k).addEventListener("change",save);
    c.querySelector("#mail_"+k).addEventListener("input",save);
    return c;
  }

  // ---- facilitator ----
  var drawer=$("facDrawer");
  $("facToggle").addEventListener("click",function(){drawer.hidden=!drawer.hidden;if(!drawer.hidden)renderFac();});

  function allVisitors(){return S.visitors.concat([S.cur]);}
  function tallyRow(label,val,total){
    var pct=total?Math.round(val/total*100):0;
    return '<div class="tally-row"><span class="tl">'+label+'</span>'+
      '<span class="tbar"><span class="tfill" style="width:'+pct+'%"></span></span>'+
      '<span class="tv">'+val+' · '+pct+'%</span></div>';
  }
  function renderFac(){
    var vis=allVisitors();
    // count only visitors who picked a first door
    var withPick=vis.filter(function(v){return v.firstDoor;});
    var n=withPick.length;
    $("visitorN").textContent=n;
    var firstCount={A:0,B:0,C:0};
    withPick.forEach(function(v){firstCount[v.firstDoor]++;});
    $("firstTally").innerHTML=["A","B","C"].map(function(k){
      return tallyRow("門 "+k+" "+DOORS[k].name,firstCount[k],n);
    }).join("");

    // want rate: among visitors who opened door k and answered
    $("wantTally").innerHTML=["A","B","C"].map(function(k){
      var opened=vis.filter(function(v){return v.commit[k]&&typeof v.commit[k].want==="boolean";});
      var yes=opened.filter(function(v){return v.commit[k].want;}).length;
      return tallyRow("門 "+k,yes,opened.length||0)+"";
    }).join("");

    // current visitor
    var cur=S.cur;
    function m(k,v,cls){return '<div class="metric"><span class="mk">'+k+'</span><span class="mv '+(cls||"")+'">'+v+'</span></div>';}
    var html="";
    html+=m("首選門",cur.firstDoor?("門 "+cur.firstDoor):"—",cur.firstDoor?"hl":"na");
    html+=m("開過的門",cur.opened.length?cur.opened.join(" · "):"—",cur.opened.length>1?"hl":(cur.opened.length?"":"na"));
    ["A","B","C"].forEach(function(k){
      var cm=cur.commit[k];
      var t=cm?(cm.want===true?"很想用":(cm.want===false?"還好":"—"))+(cm.pay?" · 願付費":"")+(cm.email?" · ✉":""):"—";
      html+=m("門 "+k+" 回應",t,cm&&cm.want?"hl":(cm?"":"na"));
    });
    html+=m("點開 A 完整原型",cur.openedFullA?"是":"否",cur.openedFullA?"hl":"na");
    html+=m("點開 B 完整原型",cur.openedFullB?"是":"否",cur.openedFullB?"hl":"na");
    html+=m("點開 C 完整原型",cur.openedFullC?"是":"否",cur.openedFullC?"hl":"na");
    $("curMetrics").innerHTML=html;
  }

  $("nextVisitor").addEventListener("click",function(){
    if(S.cur.firstDoor||S.cur.opened.length)S.visitors.push(S.cur);
    S.cur=freshVisitor();
    // reset UI to triage
    $("scrReveal").classList.remove("active");
    $("scrTriage").classList.add("active");
    window.scrollTo({top:0,behavior:"auto"});
    renderFac();
  });

  $("exportBtn").addEventListener("click",function(){
    var payload={
      exportedAt:new Date().toISOString(),
      completedVisitors:S.visitors,
      currentVisitor:S.cur,
      summary:(function(){
        var vis=allVisitors().filter(function(v){return v.firstDoor;});
        var f={A:0,B:0,C:0}; vis.forEach(function(v){f[v.firstDoor]++;});
        return {n:vis.length,firstDoor:f};
      })()
    };
    var txt=JSON.stringify(payload,null,2);
    var done=function(){$("copiedNote").textContent="已複製 JSON";setTimeout(function(){$("copiedNote").textContent="";},2200);};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,function(){fb(txt);done();});}
    else{fb(txt);done();}
  });
  function fb(txt){var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}

  renderFac();
})();
</script>
